<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Desktop Navigation</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

body{
margin:0;
font-family:'Noto Sans JP', sans-serif;
font-weight:900;
font-size:24px; /* 約1.5倍 */
}

.page{
display:none;
position:relative;
width:100vw;
height:100vh;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
background:white;
}

.active{
display:block;
}

/* 1ページ目入力UI */
.bottomBox{
position:absolute;
bottom:15%;
left:50%;
transform:translateX(-50%);
text-align:center;
}

input{
padding:15px;
font-size:24px;
width:300px;
margin-bottom:15px;

border:4px solid black; 
}

button{
padding:15px 30px;
font-size:24px;
cursor:pointer;
background:black;
color:white;
border:none;
}

.backBtn{
position:absolute;
bottom:50px;
left:50%;
transform:translateX(-50%);
}

#ranking{
position:absolute;
top:150px;
left:50%;
transform:translateX(-50%);
background:white;
padding:30px;
}

#clearBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#clearBox h1{
font-size:36px;
font-weight:900;
}

#clearBox p{
font-size:28px;
margin-top:20px;
}

</style>
</head>

<body>

<!-- 1ページ -->
<div id="page1" class="page active">
<img src="xkey.png">

<div class="bottomBox">

<input id="passwordBox">

<br>

<button onclick="checkPassword()">進む</button>

</div>
</div>

<!-- 2ページ -->
<div id="page2" class="page">
<img src="tokyo.png">
<button class="backBtn" onclick="goHome()">戻る</button>
</div>

<!-- 3ページ -->
<div id="page3" class="page">
<img src="nagoya.png">
<button class="backBtn" onclick="goHome()">戻る</button>
</div>

<!-- 4ページ -->
<div id="page4" class="page">
<img src="kyoto.png">
<button class="backBtn" onclick="goHome()">戻る</button>
</div>

<!-- 5ページ -->
<div id="page5" class="page">
<img src="hiroshima.png">
<button class="backBtn" onclick="goHome()">戻る</button>
</div>

<!-- 6ページ -->
<div id="page6" class="page">
<img src="kyushu.png">
<button class="backBtn" onclick="goHome()">戻る</button>
</div>

<!-- 7ページ（クリア画面） -->
<div id="page7" class="page">

<div id="clearBox">

<h1>おめでとうございます！謎クリアです！</h1>

<p id="clearTime"></p>

</div>

</div>

<script>

/* Firebase設定 */

const firebaseConfig = {
apiKey: "ここに貼る",
authDomain: "ここに貼る",
databaseURL: "ここに貼る",
projectId: "ここに貼る"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* ページ切り替え */

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function goHome(){
showPage("page1");
}

function checkPassword(){

let pw=document.getElementById("passwordBox").value;

if(pw==="生きる") showPage("page2");
else if(pw==="いきる") showPage("page2");
else if(pw==="イキル") showPage("page2");
else if(pw==="光") showPage("page3");
else if(pw==="ひかり") showPage("page3");
else if(pw==="ヒカリ") showPage("page3");
else if(pw==="真意") showPage("page4");
else if(pw==="しんい") showPage("page4");
else if(pw==="シンイ") showPage("page4");
else if(pw==="無限") showPage("page5");
else if(pw==="むげん") showPage("page5");
else if(pw==="ムゲン") showPage("page5");
else if(pw==="学び") showPage("page6");
else if(pw==="まなび") showPage("page6");
else if(pw==="マナビ") showPage("page6");
else if(pw==="むりはきけん") showPage("page7");
else alert("パスワードが違います");

}

/* ランキング */

function addName(){

let name=document.getElementById("nameInput").value;

if(name==="") return;

db.ref("ranking").push({
name:name,
time:Date.now()
});

document.getElementById("nameInput").value="";

}

db.ref("ranking").on("value", snapshot=>{

let data=[];

snapshot.forEach(child=>{
data.push(child.val());
});

data.sort((a,b)=>a.time-b.time);

let list=document.getElementById("list");
list.innerHTML="";

data.forEach(e=>{
let li=document.createElement("li");
li.textContent=e.name;
list.appendChild(li);
});

});

function showPage7(){

showPage("page7");

let now = new Date();

let time =
now.getHours().toString().padStart(2,"0") + "時" +
now.getMinutes().toString().padStart(2,"0") + "分" +
now.getSeconds().toString().padStart(2,"0") + "秒";

document.getElementById("clearTime").textContent = "クリア時間：" + time;

}

</script>

</body>
</html>

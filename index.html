<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Desktop Navigation</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

body{
margin:0;
font-family:'Noto Sans JP', sans-serif;
font-weight:900;
font-size:24px; /* 約1.5倍 */
}

.page{
display:none;
position:relative;
width:100vw;
height:100vh;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
background:white;
}

.active{
display:block;
}

/* 1ページ目入力UI */
.bottomBox{
position:absolute;
bottom:15%;
left:50%;
transform:translateX(-50%);
text-align:center;
}

input{
padding:15px;
font-size:24px;
width:300px;
margin-bottom:15px;

border:4px solid black; 
}

button{
padding:15px 30px;
font-size:24px;
cursor:pointer;
background:black;
color:white;
border:none;
}

.backBtn{
position:absolute;
bottom:50px;
left:50%;
transform:translateX(-50%);
}

#page8 .backBtn {
    position: static;
    transform: none;
    display: block;
    margin: 50px auto;
}

#page9{
    height:auto;
    min-height:100vh;
}

#ranking{
position:absolute;
top:150px;
left:50%;
transform:translateX(-50%);
background:white;
padding:30px;
}

#clearBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#clearBox h1{
font-size:36px;
font-weight:900;
}

#clearBox p{
font-size:28px;
margin-top:20px;
}

.smallText{
font-size:20px;     /* 小さくする */
font-weight:400;    /* 細くする */
}

/* ===== ヒントページ ===== */

/* ===== ヒントページ ===== */

.hintPage{
    max-width:700px;      /* 横幅を制限 */
    margin:0 auto;        /* 中央寄せ */
    padding:20px;
    box-sizing:border-box;
    background:white;
}

.hintPage h1{
    text-align:center;
    margin-bottom:40px;
}

.hintPage h2{
    font-size:28px;
    margin-top:35px;
}

details{
    margin:15px 0;
    border:2px solid #ccc;
    border-radius:8px;
    background:#f8f8f8;
}

summary{
    padding:15px;
    cursor:pointer;
    font-size:22px;
    font-weight:bold;
    list-style:none;
}

summary::-webkit-details-marker{
    display:none;
}

summary::before{
    content:"▶ ";
}

details[open] summary::before{
    content:"▼ ";
}

details p{
    margin:0;
    padding:15px;
    border-top:1px solid #ddd;
    font-size:20px;
    line-height:1.8;
    word-break:break-word;   /* 長い文章も折り返す */
}

/* スマホ用 */
@media (max-width: 768px){

    .hintPage{
        padding:15px;
    }

    .hintPage h1{
        font-size:30px;
    }

    .hintPage h2{
        font-size:24px;
    }

    summary{
        font-size:20px;
        padding:12px;
    }

    details p{
        font-size:18px;
        padding:12px;
    }
}

.hintTitle{
    margin-top:40px;
    margin-bottom:10px;
}

.accordion{
    width:100%;
    text-align:left;
    padding:15px;
    margin-top:10px;
    font-size:22px;
    background:#f0f0f0;
    color:#000;
    border:none;
    cursor:pointer;
    transition:0.2s;
}

.accordion:hover{
    background:#e0e0e0;
}

.accordion::before{
    content:"▶ ";
}

.accordion.active::before{
    content:"▼ ";
}

.panel{
    display:none;
    padding:15px 20px;
    background:#fafafa;
    border-left:5px solid black;
    margin-bottom:15px;
    font-size:20px;
    line-height:1.8;
}

/* page9だけ戻るボタンを下に配置 */
#page9 .backBtn{
    position:static;
    transform:none;
    display:block;
    margin:40px auto;
}

    
</style>
</head>

<body>

<!-- 1ページ -->
<div id="page1" class="page active">
<img src="xkey.png">

<div class="bottomBox">

<input id="passwordBox">

<br>

<button onclick="checkPassword()">進む</button>

</div>
</div>

<!-- 2ページ -->
<div id="page2" class="page">
<img src="tokyo.png">
<button class="backBtn" onclick="goHome()">戻る</button>
</div>

<!-- 3ページ -->
<div id="page3" class="page">
<img src="nagoya.png">
<button class="backBtn" onclick="goHome()">戻る</button>
</div>

<!-- 4ページ -->
<div id="page4" class="page">
<img src="kyoto.png">
<button class="backBtn" onclick="goHome()">戻る</button>
</div>

<!-- 5ページ -->
<div id="page5" class="page">
<img src="hiroshima.png">
<button class="backBtn" onclick="goHome()">戻る</button>
</div>

<!-- 6ページ -->
<div id="page6" class="page">
<img src="kyushu3.png">
<button class="backBtn" onclick="goHome()">戻る</button>
</div>

<!-- 回答ページ -->
<div id="page8" class="page">
<img src="answer_1.jpg" alt="画像1">
<img src="answer_2.jpg" alt="画像2">
<img src="answer_3.jpg" alt="画像3">
<img src="answer_4.jpg" alt="画像4">
<img src="answer_5.jpg" alt="画像5">

<button class="backBtn" onclick="goHome()">戻る</button>

</div>

<!-- ヒントページ -->
<div id="page9" class="page">

<div class="hintPage">

<h1>「困っているようですね…」</h1></h1>

<h2>そもそも</h2>

<details>
    <summary>0-1</summary>
    <details>
        <summary>Q.何をしていいか分からないⅠ</summary>

        <p>
            司会の説明を思い出して！
        </p>
    </details>
    <details>
        <summary>Q.何をしていいか分からないⅡ</summary>

        <p>
            「合言葉」を入れてみよう、最近なにか配られましたよね！
        </p>
    </details>
</details>

<details>
    <summary>ヒント2</summary>
    <p>□□です</p>
</details>

<h2>1の謎</h2>

<details>
    <summary>ヒント1</summary>
    <p>○○です</p>
</details>

<details>
    <summary>ヒント2</summary>
    <p>□□です</p>
</details>

<h2>2の謎</h2>

<details>
    <summary>ヒント1</summary>
    <p>△△です</p>
</details>

<details>
    <summary>ヒント2</summary>
    <p>◇◇です</p>
</details>

<br>

<button class="backBtn" onclick="goHome()">
戻る
</button>

</div>

</div>

<!-- 7ページ（クリア画面） -->
<div id="page7" class="page">

<div id="clearBox">

<h1>
おめでとうございます！<br>
謎解きクリアです！<br>
<span class="smallText">
※スタッフまでこの画面を<br>見せにきてください
</span>
</h1>

<p id="clearTime"></p>
  
</div>

</div>

<script>

/* Firebase設定 */

const firebaseConfig = {
apiKey: "ここに貼る",
authDomain: "ここに貼る",
databaseURL: "ここに貼る",
projectId: "ここに貼る"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* ページ切り替え */

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function goHome(){
showPage("page1");
}

function checkPassword(){

let pw=document.getElementById("passwordBox").value;

if(pw==="生きる") showPage("page2");
else if(pw==="いきる") showPage("page2");
else if(pw==="イキル") showPage("page2");
else if(pw==="光") showPage("page3");
else if(pw==="ひかり") showPage("page3");
else if(pw==="ヒカリ") showPage("page3");
else if(pw==="真意") showPage("page4");
else if(pw==="しんい") showPage("page4");
else if(pw==="シンイ") showPage("page4");
else if(pw==="無限") showPage("page5");
else if(pw==="むげん") showPage("page5");
else if(pw==="ムゲン") showPage("page5");
else if(pw==="学び") showPage("page6");
else if(pw==="まなび") showPage("page6");
else if(pw==="マナビ") showPage("page6");
else if(pw==="むりはきけん") showPage7();
else if(pw==="もりもとなぎさはどこ？") showPage("page8");
else if(pw==="ヒント") showPage("page9");
else alert("パスワードが違います");

}

document.addEventListener("DOMContentLoaded", function(){

    const acc = document.querySelectorAll(".accordion");

    acc.forEach(button => {

        button.addEventListener("click", function(){

            this.classList.toggle("active");

            const panel = this.nextElementSibling;

            if(getComputedStyle(panel).display === "none"){
                panel.style.display = "block";
            }else{
                panel.style.display = "none";
            }

        });

    });

});

/* ランキング */

function addName(){

let name=document.getElementById("nameInput").value;

if(name==="") return;

db.ref("ranking").push({
name:name,
time:Date.now()
});

document.getElementById("nameInput").value="";

}

db.ref("ranking").on("value", snapshot=>{

let data=[];

snapshot.forEach(child=>{
data.push(child.val());
});

data.sort((a,b)=>a.time-b.time);

let list=document.getElementById("list");
list.innerHTML="";

data.forEach(e=>{
let li=document.createElement("li");
li.textContent=e.name;
list.appendChild(li);
});

});

function showPage7(){

showPage("page7");

let now = new Date();

let time =
now.getHours().toString().padStart(2,"0") + "時" +
now.getMinutes().toString().padStart(2,"0") + "分" +
now.getSeconds().toString().padStart(2,"0") + "秒";

document.getElementById("clearTime").textContent = "クリア時間：" + time;

}

</script>

</body>
</html>
